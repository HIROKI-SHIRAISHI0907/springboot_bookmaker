process:
  python:
    root: /Users/shiraishitoshio/bookmaker/team_master_python
    pythonBin: python3
  s3:
    region: ap-northeast-1
    buckets:
      teamSeasonDateData: aws-s3-team-season-date-data
      teamData: aws-s3-team-data
      teamMemberData: aws-s3-team-member-data
      outputs: aws-s3-outputs

spring:
  datasource:
    bm:
      url: jdbc:h2:mem:bmdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      driver-class-name: org.h2.Driver
      username: sa
      password:

    master:
      url: jdbc:h2:mem:masterdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      driver-class-name: org.h2.Driver
      username: sa
      password:


mybatis:
  configuration:
    map-underscore-to-camel-case: true
    
exportcsv:
  local-only: true
